<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Web Terminal MMO - A retro-futuristic puzzle game in your browser terminal.">
    <title>WebTerm // MMO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Fira+Code:wght@300;400;500;700&family=IBM+Plex+Mono:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="drive-overlay">
        <div class="drive-overlay-content">
            <h1 class="insert-drive-title">SYSTEM OFFLINE</h1>
            <p class="insert-drive-sub">PLEASE INSERT DRIVE (.DRV FILE)</p>
            <button id="btn-no-drive" class="drive-btn">I DO NOT HAVE A DRIVE</button>
        </div>
    </div>
    <div id="crt-overlay"></div>
    <div id="terminal-container">
        <div id="terminal-header">
            <div class="header-dots">
                <span class="dot dot-red"></span>
                <span class="dot dot-yellow"></span>
                <span class="dot dot-green"></span>
            </div>
            <div id="header-title">WebTerm v1.0</div>
            <div id="header-status"></div>
            <div id="header-timer"></div>
        </div>
        <div id="terminal-output"></div>
        <div id="terminal-input-line">
            <span id="prompt"></span>
            <div id="input-visual-wrapper">
                <span id="input-visual-before"></span><span id="cursor-block" class="blink">█</span><span
                    id="input-visual-after"></span>
            </div>
            <input type="text" id="terminal-input" autocomplete="off" autofocus spellcheck="false" />
        </div>
    </div>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="js/themes.js"></script>
    <script src="js/vfs.js"></script>
    <script src="js/network.js"></script>
    <script src="js/terminal.js"></script>
    <script src="js/commands.js"></script>
    <script src="js/boot.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
